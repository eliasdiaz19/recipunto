name: Automated Deployment

on:
  push:
    branches: [ main, develop, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
        - preview

env:
  NODE_VERSION: '18'

jobs:
  # Job de deployment a staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm run test:ci
        
      - name: Build application
        run: npm run build
        
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--target=staging'
          
      - name: Notify staging deployment
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🚀 Recipunto deployed to staging successfully!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job de deployment a production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run full test suite
        run: npm run test:ci
        
      - name: Run security audit
        run: npm audit --audit-level=moderate
        
      - name: Build application
        run: npm run build
        
      - name: Build Storybook
        run: npm run storybook:build
        
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'
          
      - name: Deploy Storybook to GitHub Pages
        uses: peaceiris/actions-gh-pages@v1.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: /storybook
          
      - name: Create production deployment summary
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security audit passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build successful" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Deployed to production" >> $GITHUB_STEP_SUMMARY
          echo "- 📚 Storybook deployed to GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Deployed at: $(date)" >> $GITHUB_STEP_SUMMARY
          
      - name: Notify production deployment
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🎉 Recipunto deployed to production successfully!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job de preview deployment
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm run test:ci
        
      - name: Build application
        run: npm run build
        
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--target=preview'
          
      - name: Get preview URL
        id: preview-url
        run: |
          echo "url=$(vercel --token ${{ secrets.VERCEL_TOKEN }} ls | grep preview | head -1 | awk '{print $2}')" >> $GITHUB_OUTPUT
          
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment Ready!**\n\nYour changes have been deployed to: ${steps.preview-url.outputs.url}\n\nThis is a preview deployment for testing purposes.`
            })
        if: github.event_name == 'pull_request'

  # Job de rollback (manual trigger)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
        
      - name: Rollback to previous deployment
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} rollback
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🔄 Recipunto deployment rolled back successfully!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job de health check post-deployment
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always() && (needs.deploy-production.result == 'success' || needs.deploy-staging.result == 'success')
    
    steps:
      - name: Wait for deployment
        run: sleep 30
        
      - name: Health check production
        if: needs.deploy-production.result == 'success'
        run: |
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1
          
      - name: Health check staging
        if: needs.deploy-staging.result == 'success'
        run: |
          curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1
          
      - name: Notify health check results
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Recipunto health checks passed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
